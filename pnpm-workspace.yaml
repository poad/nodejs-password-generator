packages:
  - ./package/core
  - ./example
  - ./example/cdk

allowBuilds:
  '@swc/core': false
  esbuild: false
  unrs-resolver: false

autoInstallPeers: true

enablePrePostScripts: true

legacyPeerDeps: true
minimumReleaseAgeExclude:
  - esbuild@0.28.1
overrides:
  esbuild@>=0.17.0 <0.28.1: ^0.28.1
  file-type@>=13.0.0 <21.3.1: '>=21.3.1'

strictPeerDependencies: false
